<header class="site-header">
  <div class="container header-inner">
    <a href="{{ "/" | relURL }}" class="site-logo" aria-label="Home">
      <img src="{{ "images/logo/lumo_icon_square.svg" | relURL }}" alt="LUMO Logo" width="34" height="34">
      <span class="site-title">LUMO</span>
    </a>
    <nav class="site-nav" id="site-nav" aria-label="Primary">
      <ul>
        {{- range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
        {{- end }}
      </ul>
    </nav>
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Theme: system. Activate to switch to light theme." title="Theme: system">
        <span class="theme-icon icon-system" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="12" rx="2" ry="2"></rect>
            <path d="M8 20h8M12 16v4"></path>
          </svg>
        </span>
        <span class="theme-icon icon-sun" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        </span>
        <span class="theme-icon icon-moon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"></path>
          </svg>
        </span>
      </button>
      <button class="nav-toggle" type="button" aria-controls="site-nav" aria-label="Open navigation" aria-expanded="false">
        <span class="hamburger"></span>
      </button>
    </div>
  </div>
</header>
<script>
  (function () {
    const html = document.documentElement;
    const header = document.querySelector('.site-header');
    const nav = document.getElementById('site-nav');
    const navToggle = document.querySelector('.nav-toggle');
    const themeToggle = document.getElementById('theme-toggle');
    const themePreferences = ['system', 'light', 'dark'];
    const colorSchemeMedia = typeof window.matchMedia === 'function'
      ? window.matchMedia('(prefers-color-scheme: dark)')
      : null;

    function setNavState(isOpen) {
      nav.classList.toggle('open', isOpen);
      navToggle.setAttribute('aria-expanded', String(isOpen));
      navToggle.setAttribute('aria-label', isOpen ? 'Close navigation' : 'Open navigation');
    }

    function getAppliedTheme(preference) {
      if (preference === 'dark' || preference === 'light') {
        return preference;
      }
      return colorSchemeMedia && colorSchemeMedia.matches ? 'dark' : 'light';
    }

    function getNextThemePreference(preference) {
      const currentIndex = themePreferences.indexOf(preference);
      const nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % themePreferences.length;
      return themePreferences[nextIndex];
    }

    function formatThemeLabel(preference) {
      return preference.charAt(0).toUpperCase() + preference.slice(1);
    }

    function syncThemeButton(preference) {
      const currentLabel = formatThemeLabel(preference);
      const nextLabel = formatThemeLabel(getNextThemePreference(preference));
      themeToggle.setAttribute('aria-label', 'Theme: ' + currentLabel + '. Activate to switch to ' + nextLabel + ' theme.');
      themeToggle.setAttribute('title', 'Theme: ' + currentLabel);
    }

    function applyThemePreference(preference, options) {
      const settings = options || {};
      const appliedTheme = getAppliedTheme(preference);
      html.setAttribute('data-theme', appliedTheme);
      html.setAttribute('data-theme-preference', preference);
      syncThemeButton(preference);
      if (settings.persist === false) {
        return;
      }
      try {
        localStorage.setItem('theme-preference', preference);
        localStorage.removeItem('theme');
      } catch (error) {
      }
    }

    navToggle.addEventListener('click', function () {
      const expanded = this.getAttribute('aria-expanded') === 'true';
      setNavState(!expanded);
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        setNavState(false);
      }
    });

    document.addEventListener('click', function (event) {
      if (window.innerWidth >= 1024) return;
      if (!header.contains(event.target)) {
        setNavState(false);
      }
    });

    nav.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function () {
        if (window.innerWidth < 1024) {
          setNavState(false);
        }
      });
    });

    window.addEventListener('resize', function () {
      if (window.innerWidth >= 1024) {
        setNavState(false);
      }
    });

    themeToggle.addEventListener('click', function () {
      const currentPreference = html.getAttribute('data-theme-preference') || 'system';
      applyThemePreference(getNextThemePreference(currentPreference));
    });

    if (colorSchemeMedia) {
      const handleColorSchemeChange = function () {
        const preference = html.getAttribute('data-theme-preference') || 'system';
        if (preference === 'system') {
          applyThemePreference('system', { persist: false });
        }
      };
      if (typeof colorSchemeMedia.addEventListener === 'function') {
        colorSchemeMedia.addEventListener('change', handleColorSchemeChange);
      } else if (typeof colorSchemeMedia.addListener === 'function') {
        colorSchemeMedia.addListener(handleColorSchemeChange);
      }
    }

    applyThemePreference(html.getAttribute('data-theme-preference') || 'system', { persist: false });
  })();
</script>
