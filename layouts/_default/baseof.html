<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}" data-theme="light" data-theme-preference="system">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  {{- partial "header.html" . -}}
  <main id="main-content" tabindex="-1">
    {{- block "main" . }}{{ end -}}
  </main>
  {{- partial "footer.html" . -}}
</body>
</html>
